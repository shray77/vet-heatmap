name: Update outbreak data

on:
  schedule:
    # Run Mon & Thu at 06:00 UTC (= 09:00 Moscow time MSK)
    - cron: "0 6 * * 1,4"
  workflow_dispatch: # allow manual triggering

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run scraper pipeline
        run: bun run scripts/scrape/run-all.ts

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet public/data/outbreaks.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/outbreaks.json scripts/scrape/.cache/fsvps-pdfs.json
          git commit -m "chore(data): refresh outbreak dataset [skip ci]

          Scraper run: $(date -u +'%Y-%m-%d %H:%M UTC')
          Sources: fsvps.gov.ru PDF index (real), curated (fallback)
          "
          git push

      - name: Trigger deploy workflow
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            });
