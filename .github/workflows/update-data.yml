name: Update outbreak data

on:
  schedule:
    # Every 6 hours: 03:00, 09:00, 15:00, 21:00 UTC (Moscow +3h)
    - cron: "0 3,9,15,21 * * *"
  workflow_dispatch: # allow manual triggering

permissions:
  contents: write
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python (for scrapers + Playwright)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + Chromium
        # Used by yandex-enterprises.py to scrape Yandex.Maps.
        # Browser is ~150MB but cached between runs.
        run: |
          pip install --quiet playwright
          python -m playwright install --with-deps chromium

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run scraper pipeline (FSVPS + WAHIS + curated)
        run: timeout 300 bun run scripts/scrape/run-all.ts || true
        env:
          SCRAPE_TIMEOUT: "240"

      - name: Post-process (infer regions + federal districts)
        run: python3 scripts/post-process.py || true

      - name: Geocode (Nominatim + region centroids)
        run: timeout 240 python3 scripts/geocode.py || true

      - name: Fast-geocode fallback (region centroid + jitter)
        # Always runs — assigns coords to any outbreaks that still don't
        # have lat/lon after the Nominatim pass (rate-limited, often times
        # out in CI for 1000+ outbreaks). Uses region centroid + ±0.3°
        # deterministic jitter so points don't stack at exact region center.
        run: python3 scripts/fast-geocode.py

      - name: Scrape enterprises (Overpass + curated)
        # Use Python version — Bun version crashed on long-running Overpass
        # queries (fetch failed, AbortController issues). Python's urllib is
        # stable. Script saves partial results after each category, so even
        # if it dies mid-run we still get a usable enterprises.json.
        run: timeout 240 python3 scripts/scrape/osint-enterprises.py || true

      - name: Scrape Yandex.Maps enterprises (Playwright)
        # Yandex has much better coverage of Russian businesses than OSM —
        # many small/medium farms, meat plants, and feed mills are listed
        # in Yandex Business but not tagged in OSM at all.
        # Uses Playwright (headless Chromium) to bypass JS-heavy Yandex UI.
        # Searches top-30 cities × 5 categories = 150 searches.
        # 540s timeout = 9 min (150 × ~3.5s avg per search).
        # Saves partial results after each city×category.
        run: timeout 540 python3 scripts/scrape/yandex-enterprises.py --cities 30 --categories 5 --scroll-pages 3 || true

      - name: Check for changes
        id: changes
        run: |
          # Track both outbreak + enterprise datasets.
          # Use --quiet (exit 0 = no changes, 1 = changes present).
          changed=0
          for f in public/data/outbreaks.json public/data/enterprises.json public/data/enterprises-yandex.json; do
            if [ -f "$f" ]; then
              if ! git diff --no-color --quiet -- "$f"; then
                changed=1
                echo "  changed: $f"
              fi
            fi
          done
          if [ "$changed" = "1" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Explicit file list — never use `git add -A` / `git add .`
          # because scripts/scrape/.cache/ is gitignored and would
          # cause "fatal: pathspec did not match any files" or
          # "The following paths are ignored by one of your .gitignore files".
          FILES_TO_ADD=()
          for f in public/data/outbreaks.json public/data/enterprises.json public/data/enterprises-yandex.json; do
            if [ -f "$f" ]; then
              FILES_TO_ADD+=("$f")
            fi
          done

          if [ "${#FILES_TO_ADD[@]}" -eq 0 ]; then
            echo "No data files to add — skipping commit."
            exit 0
          fi

          printf 'Adding files:\n'
          printf '  %s\n' "${FILES_TO_ADD[@]}"

          git add -- "${FILES_TO_ADD[@]}"
          git commit -m "chore(data): refresh outbreak + enterprise datasets [skip ci]

          Scraper run: $(date -u +'%Y-%m-%d %H:%M UTC')
          Sources: fsvps.gov.ru + wahis.woah.org + curated + OSM Overpass + Yandex.Maps
          "
          git push

      - name: Trigger deploy workflow
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            });
