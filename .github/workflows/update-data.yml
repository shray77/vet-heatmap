name: Update outbreak data

on:
  schedule:
    # Every 6 hours: 03:00, 09:00, 15:00, 21:00 UTC (Moscow +3h)
    - cron: "0 3,9,15,21 * * *"
  workflow_dispatch: # allow manual triggering

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run scraper pipeline (FSVPS + WAHIS + curated)
        run: timeout 300 bun run scripts/scrape/run-all.ts || true
        env:
          SCRAPE_TIMEOUT: "240"

      - name: Post-process (infer regions + federal districts)
        run: python3 scripts/post-process.py || true

      - name: Geocode (Nominatim + region centroids)
        run: python3 scripts/geocode.py || true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet public/data/outbreaks.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/outbreaks.json
          git commit -m "chore(data): refresh outbreak dataset [skip ci]

          Scraper run: $(date -u +'%Y-%m-%d %H:%M UTC')
          Sources: fsvps.gov.ru + wahis.woah.org + curated
          "
          git push

      - name: Trigger deploy workflow
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            });
